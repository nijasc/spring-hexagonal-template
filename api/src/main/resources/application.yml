spring:
  application:
    name: YourAPI
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info

server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path: /api/v1
  forward-headers-strategy: framework
